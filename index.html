<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParaMapz - Paranormal Locations</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    
    <style>
    /* Custom Leaflet control styling */
    .leaflet-control-zoom {
        border: 2px solid #444 !important;
        background: rgba(0, 0, 0, 0.9) !important;
        box-shadow: 0 2px 10px rgba(255, 107, 53, 0.3) !important;
    }

    .leaflet-control-zoom a {
        background-color: rgba(42, 42, 42, 0.95) !important;
        color: #ff6b35 !important;
        border-bottom: 1px solid #444 !important;
    }

    .leaflet-control-zoom a:hover {
        background-color: rgba(255, 107, 53, 0.2) !important;
        color: #ff8c42 !important;
    }

    .leaflet-bar {
        border: none !important;
    }

    .leaflet-control-attribution {
        background: rgba(0, 0, 0, 0.8) !important;
        color: #ccc !important;
    }

    .leaflet-control-attribution a {
        color: #ff6b35 !important;
    }
        
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
 
    body {
        font-family: 'Arial', sans-serif;
        background: linear-gradient(135deg, #0f0f0f 0%, #1a0a0a 100%);
        color: #ffffff;
        min-height: 100vh;
        overflow-x: hidden;
    }
 
    .header {
        background: linear-gradient(135deg, #2c1810, #4a2c17);
        padding: 20px 0;
        text-align: center;
        box-shadow: 0 2px 20px rgba(255, 107, 53, 0.3);
    }
 
    .header-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 20px;
        text-align: center;
    }
 
    .header-logo {
        max-height: 80px;
        max-width: 200px;
        height: auto;
        filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.7));
        flex-shrink: 0;
    }
 
    .header-text {
        text-align: center;
    }
 
    .header h1 {
        font-size: 2.5em;
        color: #ff6b35;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
        margin-bottom: 10px;
    }
 
    .header p {
        color: #cccccc;
        font-size: 1.1em;
    }
 
    @media (max-width: 768px) {
        .header-content {
            gap: 15px;
        }
        
        .header-logo {
            max-height: 60px;
        }
    }
 
    .container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 20px;
    }
 
    .map-controls {
        background: rgba(42, 42, 42, 0.9);
        padding: 20px;
        border-radius: 10px;
        margin-bottom: 20px;
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
        align-items: center;
    }

    .search-row {
        width: 100%;
        display: flex;
        justify-content: center;
        margin-bottom: 5px;
    }

    .search-wrap {
        width: 100%;
        max-width: 540px;
        position: relative;
    }

    .search-wrap input {
        width: 100%;
        padding: 12px 42px 12px 14px;
        border: 1px solid #666;
        border-radius: 999px;
        background: #2d2d2d;
        color: #fff;
        font-size: 15px;
        text-align: left;
        box-shadow: 0 0 0 1px rgba(255, 107, 53, 0.08);
    }

    .search-wrap input:focus {
        outline: none;
        border-color: #ff6b35;
        box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.18);
    }

    .search-wrap::after {
        content: '⌕';
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: #ff6b35;
        font-size: 18px;
        pointer-events: none;
    }
 
    .control-group {
        display: flex;
        flex-direction: column;
        gap: 5px;
    }
 
    .control-group label {
        color: #ff6b35;
        font-size: 0.9em;
        font-weight: bold;
    }
 
    select, input {
        padding: 8px;
        border: 1px solid #555;
        border-radius: 5px;
        background: #333;
        color: white;
        font-size: 14px;
    }
 
    .generate-btn {
        background: linear-gradient(135deg, #ff6b35, #e55a2e);
        color: white;
        border: none;
        padding: 12px 25px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        font-size: 16px;
        transition: all 0.3s ease;
        margin-left: auto;
    }
 
    .generate-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(255, 107, 53, 0.4);
    }
 
    .map-container {
        background: rgba(42, 42, 42, 0.9);
        border-radius: 15px;
        padding: 20px;
        margin-bottom: 30px;
        position: relative;
        overflow: hidden;
    }
 
    #map {
        width: 100%;
        height: 700px;
        border-radius: 10px;
        border: 2px solid #444;
        position: relative;
        z-index: 1;
        background-color: #1a1a1a;
    }

    .results-panel {
        background: rgba(42, 42, 42, 0.9);
        border-radius: 15px;
        padding: 20px;
        margin-top: 0;
        width: 100%;
        position: relative;
        top: auto;
        min-height: auto;
    }

    .results-panel-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 18px;
        padding-bottom: 12px;
        border-bottom: 1px solid #333;
    }

    .results-panel-header h3 {
        color: #ff6b35;
        font-size: 1.2em;
    }

    .results-subtext {
        color: #bbb;
        font-size: 0.9em;
    }
 
    .leaflet-container {
        background-color: #1a1a1a !important;
    }
 
    /* Custom marker styles */
    .ed-marker {
        background: radial-gradient(circle, #ff6b35, #cc4a1a);
        border: 2px solid #ff8c42;
        border-radius: 50%;
        width: 24px;
        height: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        box-shadow: 0 2px 10px rgba(255, 107, 53, 0.7);
        animation: pulse 2s infinite;
        cursor: pointer;
        transition: opacity 0.3s ease, transform 0.25s ease, box-shadow 0.25s ease;
    }
        
    .ed-marker:hover,
    .ed-marker.selected {
        opacity: 1;
        transform: scale(1.1);
        box-shadow: 0 0 18px rgba(255, 107, 53, 0.85);
    }


    /* Activity-based map marker glow */
    .ed-marker.activity-low {
        background: radial-gradient(circle, #44ff44, #1f8f1f);
        border-color: #44ff44;
        box-shadow: 0 0 14px rgba(68, 255, 68, 0.75);
    }

    .ed-marker.activity-moderate {
        background: radial-gradient(circle, #ffaa44, #b86518);
        border-color: #ffaa44;
        box-shadow: 0 0 16px rgba(255, 170, 68, 0.78);
    }

    .ed-marker.activity-high {
        background: radial-gradient(circle, #ff4444, #9f1f1f);
        border-color: #ff4444;
        box-shadow: 0 0 20px rgba(255, 68, 68, 0.90);
    }
 
    @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(255, 107, 53, 0.7); }
        70% { box-shadow: 0 0 0 10px rgba(255, 107, 53, 0); }
        100% { box-shadow: 0 0 0 0 rgba(255, 107, 53, 0); }
    }
 
    /* Custom popup styles */
    .leaflet-popup-content-wrapper {
        background: rgba(0, 0, 0, 0.95) !important;
        border: 2px solid #ff6b35 !important;
        border-radius: 10px !important;
        color: #fff !important;
    }
 
    .leaflet-popup-content {
        color: #fff !important;
        margin: 15px !important;
    }
 
    .leaflet-popup-content h3 {
        color: #ff6b35 !important;
        margin-bottom: 8px !important;
        font-size: 1.1em !important;
    }
 
    .leaflet-popup-content p {
        color: #ccc !important;
        font-size: 0.9em !important;
        line-height: 1.4 !important;
    }
 
    .leaflet-popup-tip {
        background: rgba(0, 0, 0, 0.95) !important;
        border: 2px solid #ff6b35 !important;
    }
 
    .leaflet-popup-close-button {
        color: #ff6b35 !important;
        font-size: 18px !important;
        font-weight: bold !important;
    }
 
    .locations-list {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 20px;
        margin-top: 0;
        align-items: stretch;
        max-height: none;
        overflow-y: visible;
        padding-right: 0;
    }
 
    .location-card {
        background: linear-gradient(145deg, #2a2a2a, #1f1f1f);
        border: 1px solid #444;
        border-top: 1px solid #444;
        border-radius: 15px;
        padding: 20px;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        height: 100%;
        cursor: pointer;
    }

    /* Removes the old full-width top activity bar */
    .location-card::before {
        display: none;
    }
 
    .location-card:hover {
        transform: translateY(-5px);
        border-color: #ff6b35;
    }

    .location-card.selected {
        transform: translateY(-5px);
        border-color: #ff8c42;
    }

    /* Modern activity badge */
    .activity-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        width: fit-content;
        padding: 5px 10px;
        border-radius: 999px;
        font-size: 0.75em;
        font-weight: 700;
        margin-bottom: 10px;
        letter-spacing: 0.3px;
    }

    .activity-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        display: inline-block;
    }

    .activity-badge.low {
        background: rgba(68, 255, 68, 0.12);
        color: #44ff44;
        border: 1px solid rgba(68, 255, 68, 0.45);
        box-shadow: 0 0 8px rgba(68, 255, 68, 0.22);
    }

    .activity-badge.low .activity-dot {
        background: #44ff44;
        box-shadow: 0 0 8px rgba(68, 255, 68, 0.7);
    }

    .activity-badge.moderate {
        background: rgba(255, 170, 68, 0.12);
        color: #ffaa44;
        border: 1px solid rgba(255, 170, 68, 0.45);
        box-shadow: 0 0 8px rgba(255, 170, 68, 0.25);
    }

    .activity-badge.moderate .activity-dot {
        background: #ffaa44;
        box-shadow: 0 0 8px rgba(255, 170, 68, 0.7);
    }

    .activity-badge.high {
        background: rgba(255, 68, 68, 0.12);
        color: #ff4444;
        border: 1px solid rgba(255, 68, 68, 0.50);
        box-shadow: 0 0 10px rgba(255, 68, 68, 0.30);
        animation: highBadgePulse 2.5s infinite;
    }

    .activity-badge.high .activity-dot {
        background: #ff4444;
        box-shadow: 0 0 10px rgba(255, 68, 68, 0.85);
    }

    @keyframes highBadgePulse {
        0% { box-shadow: 0 0 8px rgba(255, 68, 68, 0.28); }
        50% { box-shadow: 0 0 16px rgba(255, 68, 68, 0.55); }
        100% { box-shadow: 0 0 8px rgba(255, 68, 68, 0.28); }
    }

    /* Activity-based card glow */
    .location-card.activity-low {
        box-shadow: 0 0 8px rgba(68, 255, 68, 0.18);
    }

    .location-card.activity-moderate {
        box-shadow: 0 0 10px rgba(255, 170, 68, 0.22);
    }

    .location-card.activity-high {
        box-shadow: 0 0 12px rgba(255, 68, 68, 0.28);
    }

    /* Full outline glow by activity level on hover */
	.location-card.activity-low:hover,
	.location-card.activity-low.selected,
	.location-card.activity-low.expanded {
    	border-color: #44ff44;
    	box-shadow:
       	 0 0 0 1px rgba(68, 255, 68, 0.75),
       	 0 0 18px rgba(68, 255, 68, 0.55);
}

	.location-card.activity-moderate:hover,
	.location-card.activity-moderate.selected,
	.location-card.activity-moderate.expanded {
    	border-color: #ffaa44;
    	box-shadow:
       	 0 0 0 1px rgba(255, 170, 68, 0.75),
       	 0 0 22px rgba(255, 170, 68, 0.60);
}

	.location-card.activity-high:hover,
	.location-card.activity-high.selected,
	.location-card.activity-high.expanded {
    	border-color: #ff4444;
   		box-shadow:
       	 0 0 0 1px rgba(255, 68, 68, 0.85),
       	 0 0 28px rgba(255, 68, 68, 0.70);
}

    .location-image {
        text-align: center;
        margin-bottom: 15px;
    }

    .location-image img {
        max-width: 150px;
        max-height: 150px;
        width: auto;
        height: auto;
        border-radius: 10px;
        border: 2px solid #444;
        object-fit: cover;
    }
 
    .location-title {
        color: #ff6b35;
        font-size: 1.3em;
        margin-bottom: 10px;
        font-weight: bold;
    }
 
    .location-type {
        display: inline-block;
        background: rgba(255, 107, 53, 0.2);
        color: #ff6b35;
        padding: 4px 12px;
        border-radius: 15px;
        font-size: 0.8em;
        margin-bottom: 15px;
        border: 1px solid #ff6b35;
    }
 
    .location-story {
        color: #ccc;
        line-height: 1.6;
        margin-bottom: 15px;
        display: -webkit-box;
        -webkit-line-clamp: 10;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }
 
    .location-features {
        border-top: 1px solid #333;
        padding-top: 15px;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }

    .location-card:hover .location-story,
    .location-card.expanded .location-story,
    .location-card:hover .location-features,
    .location-card.expanded .location-features {
        display: block;
        -webkit-line-clamp: unset;
        overflow: visible;
    }

    .location-card.expanded {
        transform: translateY(-5px) scale(1.01);
        border-color: #ff8c42;
    }

    .expand-hint {
        display: block;
        margin-top: 12px;
        color: #ff6b35;
        font-size: 0.85rem;
        font-weight: 700;
        text-align: center;
        opacity: 0.9;
    }

    .location-card.expanded .expand-hint::before {
        content: 'Showing full details — ';
        color: #ffaa44;
    }
 
    .location-features h4 {
        color: #ff6b35;
        font-size: 0.9em;
        margin-bottom: 8px;
    }
 
    .features-list {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
    }
 
    .feature-tag {
        background: rgba(255, 107, 53, 0.1);
        color: #ff6b35;
        padding: 3px 8px;
        border-radius: 10px;
        font-size: 0.8em;
        border: 1px solid rgba(255, 107, 53, 0.3);
    }
 
    .loading {
        text-align: center;
        color: #ff6b35;
        font-size: 1.2em;
        padding: 40px;
    }

    .no-results {
        text-align: center;
        color: #ccc;
        padding: 30px 20px;
        border: 1px dashed #555;
        border-radius: 12px;
        background: rgba(255,255,255,0.02);
        grid-column: 1 / -1;
    }
 
    .coordinates {
        color: #aaa;
        font-size: 0.8em;
        margin-bottom: 10px;
    }
 
    .statistics {
        background: rgba(42, 42, 42, 0.9);
        padding: 15px;
        border-radius: 10px;
        margin-bottom: 20px;
        display: flex;
        justify-content: space-around;
        text-align: center;
    }
 
    .stat-item {
        color: #ff6b35;
    }
 
    .stat-number {
        font-size: 1.5em;
        font-weight: bold;
    }

    .legend {
        background: rgba(42, 42, 42, 0.9);
        padding: 20px;
        border-radius: 10px;
        margin-bottom: 20px;
    }

    .legend-items {
        display: flex;
        justify-content: space-around;
        flex-wrap: wrap;
        gap: 15px;
    }

    .legend-item {
        display: flex;
        align-items: center;
        gap: 8px;
        color: #ccc;
        font-size: 0.9em;
    }

    .legend-color {
        width: 20px;
        height: 20px;
        border-radius: 3px;
        border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .activity-high-legend {
        background: #ff4444;
    }

    .activity-moderate-legend {
        background: #ffaa44;
    }

    .activity-low-legend {
        background: #44ff44;
    }
 
    @media (max-width: 768px) {
        .map-controls {
            flex-direction: column;
            align-items: stretch;
        }
        
        .generate-btn {
            margin-left: 0;
        }
        
        .header h1 {
            font-size: 2em;
        }
        
        .statistics {
            flex-direction: column;
            gap: 10px;
        }

        .legend-items {
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .legend-item {
            justify-content: center;
        }

        .results-panel-header {
            flex-direction: column;
            align-items: flex-start;
        }

        .locations-list {
            grid-template-columns: 1fr;
    }
	/* ===== FADE SCROLLBAR (PREMIUM BEHAVIOR) ===== */

/* Firefox */
html, body {
    scrollbar-width: thin;
    scrollbar-color: rgba(255,107,53,0.6) transparent;
}

/* Chrome / Edge / Safari */
html::-webkit-scrollbar,
body::-webkit-scrollbar {
    width: 8px;
}

/* Track stays invisible */
html::-webkit-scrollbar-track,
body::-webkit-scrollbar-track {
    background: transparent;
}

/* Thumb (hidden by default) */
html::-webkit-scrollbar-thumb,
body::-webkit-scrollbar-thumb {
    background: linear-gradient(180deg, #ff6b35, #cc4a1a);
    border-radius: 999px;
    border: 2px solid transparent;
    opacity: 0;
    transition: opacity 0.3s ease, box-shadow 0.3s ease;
}

/* Show scrollbar when user interacts */
body:hover::-webkit-scrollbar-thumb,
body:active::-webkit-scrollbar-thumb {
    opacity: 0.6;
}

/* Stronger on hover */
html::-webkit-scrollbar-thumb:hover,
body::-webkit-scrollbar-thumb:hover {
    opacity: 1;
    box-shadow: 0 0 12px rgba(255, 107, 53, 0.7);
}
		
    </style>
</head>
<body>
 
    <div class="container">
        <div class="statistics">
            <div class="stat-item">
                <div class="stat-number" id="totalLocations">20</div>
                <div>Total Locations</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="highActivity">4</div>

            </div>
            <div class="stat-item">
                <div class="stat-number" id="displayedCount">0</div>

                    <option value="MO">Missouri</option>

                    <option value="NH">New Hampshire</option>
                    <option value="NJ">New Jersey</option>
                    <option value="NM">New Mexico</option>
                    <option value="NY">New York</option>
                    <option value="NC">North Carolina</option>
                    <option value="ND">North Dakota</option>
                    <option value="OH">Ohio</option>
                    <option value="OK">Oklahoma</option>
                    <option value="OR">Oregon</option>

                    <option value="Ghost Town">Ghost Towns</option>
                    <option value="Historic House">Historic Houses</option>
                    <option value="Hotel">Hotels</option>
                    <option value="Industrial Site">Industrial Sites</option>
                    <option value="Military Site">Military Sites</option>
                    <option value="Mining">Mining Sites</option>
                    <option value="Prison">Prisons</option>
                    <option value="Restaurant">Restaurants</option>
                    <option value="Saloon">Saloons</option>
                    <option value="Terrain">Terrain</option>                    
                    <option value="Theater">Theaters</option>
                </select>
            </div>
 
            <div class="control-group">
                <label>Activity Level:</label>
                <select id="activityLevel">
                    <option value="">All Levels</option>
                    <option value="low">Low Activity</option>
                    <option value="moderate">Moderate Activity</option>
                    <option value="high">High Activity</option>
                </select>
            </div>
 
            <div class="control-group">
                <label>Sort By:</label>
                <select id="sortOrder">
                    <option value="alphabetical">Alphabetical (A-Z)</option>
                    <option value="alphabetical-desc">Alphabetical (Z-A)</option>
                    <option value="activity">Activity Level</option>
                    <option value="year">Year Established</option>
                    <option value="type">Location Type</option>
                    <option value="city">City Name</option>
                </select>
            </div>

            <div class="control-group" style="display: flex; flex-direction: row; align-items: center; gap: 8px;">
                <input type="checkbox" id="bookmarkFilter" onchange="showBookmarkedOnly()" style="accent-color: #ff6b35; width: 18px; height: 18px; cursor: pointer;">
                <label for="bookmarkFilter" style="cursor: pointer;">Show Saved Only</label>
            </div>
 
            <button class="generate-btn" onclick="filterAndDisplayLocations()">
                Apply Filters
            </button>
        </div>

        <div class="map-container">
            <div id="map"></div>
        </div>
         
        <div class="results-panel">
            <div class="results-panel-header">
                <h3>Search Results</h3>
                <div class="results-subtext" id="resultsSummary">Showing 0 locations</div>
            </div>
            <div id="locationsList" class="locations-list">
                <!-- Generated locations will appear here -->
            </div>
        </div>
    </div>
 
    <!-- Leaflet JavaScript -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    
    <script>
        let map = L.map('map', {
            center: [39.8283, -98.5795],
            zoom: 4,
            minZoom: 3,
            maxZoom: 18,
            worldCopyJump: true
        });

        const primaryTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 19
        });

        const fallbackTiles = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
            maxZoom: 19
        });

        const secondaryTiles = L.tileLayer('https://cartodb-basemaps-{s}.global.ssl.fastly.net/dark_all/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 19
        });

        let currentTileLayer = primaryTiles;
        currentTileLayer.addTo(map);

        let tileErrorCount = 0;
        map.on('tileerror', function(error) {
            console.log('Tile loading error:', error);
            tileErrorCount++;
            
            if (tileErrorCount > 3) {
                console.log('Switching to fallback tiles...');
                map.removeLayer(currentTileLayer);
                
                if (currentTileLayer === primaryTiles) {
                    currentTileLayer = secondaryTiles;
                    currentTileLayer.addTo(map);
                } else if (currentTileLayer === secondaryTiles) {
                    currentTileLayer = fallbackTiles;
                    currentTileLayer.addTo(map);
                }
                
                tileErrorCount = 0;
            }
        });

        setTimeout(() => {
            if (tileErrorCount > 0) {
                console.log('Force switching to OpenStreetMap tiles...');
                map.removeLayer(currentTileLayer);
                currentTileLayer = fallbackTiles;
                currentTileLayer.addTo(map);
            }
        }, 5000);
 
        let markersGroup = L.layerGroup().addTo(map);
        let markerIndex = {};
        let selectedLocationId = null;
        let hauntedLocations = [];
        let currentDisplayedLocations = [];

        async function loadLocations() {
            try {
                document.getElementById('totalLocations').textContent = 'Loading...';
                const response = await fetch('https://script.google.com/macros/s/AKfycby1zmlK_yXACcl1ddh_lia1DH8nSkCKXtbuuaonQFombQqNR7pyNuUvYy7lyWIj6c9WNw/exec');
                hauntedLocations = await response.json();
                console.log(`Loaded ${hauntedLocations.length} locations`);
                populateCityFilter();
                initializeApp();
            } catch (error) {
                console.error('Error loading locations:', error);
                document.getElementById('totalLocations').textContent = 'Error';
            }
        }
		
        let bookmarkedLocations = JSON.parse(localStorage.getItem('paramapz_bookmarks')) || [];

        function saveBookmarksToStorage() {
            localStorage.setItem('paramapz_bookmarks', JSON.stringify(bookmarkedLocations));
        }

        function isBookmarked(locationId) {
            return bookmarkedLocations.includes(locationId);
        }

        function toggleBookmark(locationId, event) {
            if (event) event.stopPropagation();
            
            if (isBookmarked(locationId)) {
                bookmarkedLocations = bookmarkedLocations.filter(id => id !== locationId);
            } else {
                bookmarkedLocations.push(locationId);
            }
            
            saveBookmarksToStorage();
            updateBookmarkUI(locationId);
            updateBookmarkCount();
        }

        function updateBookmarkUI(locationId) {
            const buttons = document.querySelectorAll(`[data-bookmark-id="${locationId}"]`);
            buttons.forEach(btn => {
                if (isBookmarked(locationId)) {
                    btn.classList.add('bookmarked');
                    btn.innerHTML = getBookmarkIcon(true) + ' Saved';
                    btn.title = 'Remove from Saved';
                } else {
                    btn.classList.remove('bookmarked');
                    btn.innerHTML = getBookmarkIcon(false) + ' Save';
                    btn.title = 'Save Location';
                }
            });
        }

        function getBookmarkIcon(filled) {
            if (filled) {
                return `<svg viewBox="0 0 24 24" width="14" height="14" style="width: 14px !important; height: 14px !important; min-width: 14px; max-width: 14px; fill: currentColor;"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`;
            } else {
                return `<svg viewBox="0 0 24 24" width="14" height="14" style="width: 14px !important; height: 14px !important; min-width: 14px; max-width: 14px; fill: currentColor;"><path d="M16.5 3c-1.74 0-3.41.81-4.5 2.09C10.91 3.81 9.24 3 7.5 3 4.42 3 2 5.42 2 8.5c0 3.78 3.4 6.86 8.55 11.54L12 21.35l1.45-1.32C18.6 15.36 22 12.28 22 8.5 22 5.42 19.58 3 16.5 3zm-4.4 15.55l-.1.1-.1-.1C7.14 14.24 4 11.39 4 8.5 4 6.5 5.5 5 7.5 5c1.54 0 3.04.99 3.57 2.36h1.87C13.46 5.99 14.96 5 16.5 5c2 0 3.5 1.5 3.5 3.5 0 2.89-3.14 5.74-7.9 10.05z"/></svg>`;
            }
        }

        function updateBookmarkCount() {
            const countElement = document.getElementById('bookmarkCount');
            if (countElement) countElement.textContent = bookmarkedLocations.length;
        }

        function normalizeActivityLevel(activityLevel) {
            const normalized = String(activityLevel || '')
                .trim()
                .toLowerCase()
                .replace(/\s+activity$/, '');

            if (normalized === 'high' || normalized === 'moderate' || normalized === 'low') {
                return normalized;
            }

            return 'low';
        }

        function showBookmarkedOnly() {
            const bookmarkFilter = document.getElementById('bookmarkFilter');
            if (bookmarkFilter && bookmarkFilter.checked) {
                const bookmarkedLocs = hauntedLocations.filter(loc => isBookmarked(loc.id));
                const searchedBookmarked = applySearchAndFilters(bookmarkedLocs, true);
                displayLocationsOnMap(searchedBookmarked);
                displayLocationsList(searchedBookmarked);
                updateDisplayedCount(searchedBookmarked.length);
                if (searchedBookmarked.length > 0) centerMapOnLocations(searchedBookmarked);
            } else {
                filterAndDisplayLocations();
            }
        }

        function getPopupBookmarkButton(locationId) {
            const bookmarked = isBookmarked(locationId);
            return `
                <button 
                    onclick="toggleBookmark('${locationId}', event)" 
                    data-bookmark-id="${locationId}"
                    title="${bookmarked ? 'Remove from Saved' : 'Save Location'}"
                    style="display: inline-flex; align-items: center; gap: 4px; background: ${bookmarked ? 'rgba(255, 107, 53, 0.4)' : 'rgba(255, 107, 53, 0.2)'}; color: #ff8c42; padding: 4px 10px; border-radius: 12px; font-weight: bold; font-size: 0.75em; border: 1px solid #ff6b35; cursor: pointer;"
                    class="${bookmarked ? 'bookmarked' : ''}"
                >
                    ${getBookmarkIcon(bookmarked)} ${bookmarked ? 'Saved' : 'Save'}
                </button>
            `;
        }

        function getCardBookmarkButton(locationId) {
            const bookmarked = isBookmarked(locationId);
            return `
                <button 
                    onclick="toggleBookmark('${locationId}', event)" 
                    data-bookmark-id="${locationId}"
                    title="${bookmarked ? 'Remove from Saved' : 'Save Location'}"
                    style="display: inline-flex; align-items: center; gap: 4px; background: ${bookmarked ? 'rgba(255, 107, 53, 0.4)' : 'rgba(255, 107, 53, 0.2)'}; color: #ff8c42; padding: 4px 10px; border-radius: 12px; font-weight: bold; font-size: 0.75em; border: 1px solid #ff6b35; cursor: pointer;"
                    class="${bookmarked ? 'bookmarked' : ''}"
                >
                    ${getBookmarkIcon(bookmarked)} ${bookmarked ? 'Saved' : 'Save'}
                </button>
            `;
        }
 
        function initializeApp() {
            updateStatistics();
            updateBookmarkCount();
            displayAllLocations();
        }

        function populateCityFilter() {
            const cityFilter = document.getElementById('cityFilter');
            if (!cityFilter) return;

            const uniqueCities = [...new Set(
                hauntedLocations
                    .map(location => (location.city || '').trim())
                    .filter(Boolean)
            )].sort((a, b) => a.localeCompare(b));

            cityFilter.innerHTML = '<option value="">All Cities</option>' +
                uniqueCities.map(city => `<option value="${escapeHtml(city)}">${escapeHtml(city)}</option>`).join('');
        }
 
        function filterAndDisplayLocations() {
            const bookmarkFilter = document.getElementById('bookmarkFilter');
            const showBookmarksOnly = bookmarkFilter && bookmarkFilter.checked;

            let baseLocations = showBookmarksOnly
                ? hauntedLocations.filter(loc => isBookmarked(loc.id))
                : hauntedLocations;

            let filteredLocations = applySearchAndFilters(baseLocations);
 
            currentDisplayedLocations = filteredLocations;
            document.getElementById('locationsList').innerHTML = '<div class="loading">Filtering haunted locations...</div>';
            
            setTimeout(() => {
                displayLocationsOnMap(filteredLocations);
                displayLocationsList(filteredLocations);
                updateDisplayedCount(filteredLocations.length);
                if (filteredLocations.length > 0) centerMapOnLocations(filteredLocations);
            }, 250);
        }

        function applySearchAndFilters(baseLocations, skipSort = false) {
            const stateFilter = document.getElementById('stateFilter').value;
            const cityFilter = document.getElementById('cityFilter').value;
            const typeFilter = document.getElementById('locationType').value;
            const activityFilter = document.getElementById('activityLevel').value;
            const sortOrder = document.getElementById('sortOrder').value;
            const searchQuery = document.getElementById('searchInput').value.trim().toLowerCase();

            let filteredLocations = baseLocations.filter(location => {
                const normalizedActivity = normalizeActivityLevel(location.activityLevel);

                const stateMatch = !stateFilter || location.state === stateFilter;
                const cityMatch = !cityFilter || location.city === cityFilter;
                const typeMatch = !typeFilter || location.type === typeFilter;
                const activityMatch = !activityFilter || normalizedActivity === activityFilter;

                const haystack = [
                    location.name,
                    location.city,
                    location.state,
                    location.type,
                    location.story,
                    Array.isArray(location.features) ? location.features.join(' ') : '',
                    normalizedActivity
                ].join(' ').toLowerCase();

                const searchMatch = !searchQuery || haystack.includes(searchQuery);

                return stateMatch && cityMatch && typeMatch && activityMatch && searchMatch;
            });

            if (!skipSort) filteredLocations = sortLocations(filteredLocations, sortOrder);
            return filteredLocations;
        }
 
        function sortLocations(locations, sortBy) {
            const sortedLocations = [...locations];
            
            switch(sortBy) {
                case 'alphabetical':
                    return sortedLocations.sort((a, b) => a.name.localeCompare(b.name));
                case 'alphabetical-desc':
                    return sortedLocations.sort((a, b) => b.name.localeCompare(a.name));
                case 'activity':
                    const activityOrder = { 'high': 3, 'moderate': 2, 'low': 1 };
                    return sortedLocations.sort((a, b) => {
                        const aOrder = activityOrder[normalizeActivityLevel(a.activityLevel)];
                        const bOrder = activityOrder[normalizeActivityLevel(b.activityLevel)];
                        return bOrder - aOrder;
                    });
                case 'year':
                    return sortedLocations.sort((a, b) => a.yearEstablished - b.yearEstablished);
                case 'type':
                    return sortedLocations.sort((a, b) => a.type.localeCompare(b.type));
                case 'city':
                    return sortedLocations.sort((a, b) => a.city.localeCompare(b.city));
                default:
                    return sortedLocations.sort((a, b) => a.name.localeCompare(b.name));
            }
        }
 
        function displayAllLocations() {
            const sortOrder = document.getElementById('sortOrder')?.value || 'alphabetical';
            const sortedLocations = sortLocations(hauntedLocations, sortOrder);
            currentDisplayedLocations = sortedLocations;
            displayLocationsOnMap(sortedLocations);
            displayLocationsList(sortedLocations);
            updateDisplayedCount(sortedLocations.length);
            centerMapOnLocations(sortedLocations);
        }
 
        function centerMapOnLocations(locations) {
            if (locations.length === 0) return;
            
            if (locations.length === 1) {
                map.setView(locations[0].coordinates, 10);
            } else {
                const group = new L.featureGroup(locations.map(loc => L.marker(loc.coordinates)));
                map.fitBounds(group.getBounds().pad(0.1));
            }
        }

        function getDirectionsUrl(coordinates) {
            return `https://www.google.com/maps/dir/?api=1&destination=${coordinates[0]},${coordinates[1]}`;
        }

        function getActivityLabel(activityLevel) {
            const normalized = normalizeActivityLevel(activityLevel);
            if (normalized === 'high') return 'High Activity';
            if (normalized === 'moderate') return 'Moderate Activity';
            return 'Low Activity';
        }

        function setSelectedLocation(locationId, openPopup = true, scrollCardIntoView = true) {
            selectedLocationId = locationId;

            document.querySelectorAll('.location-card').forEach(card => {
                card.classList.toggle('selected', card.dataset.id === locationId);
            });

            Object.values(markerIndex).forEach(marker => {
                const markerEl = marker.getElement();
                if (markerEl) {
                    markerEl.classList.toggle('selected', marker.locationId === locationId);
                }
            });

            const selectedCard = document.querySelector(`.location-card[data-id="${locationId}"]`);
            if (selectedCard && scrollCardIntoView) {
                selectedCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }

            const marker = markerIndex[locationId];
            if (marker) {
                map.setView(marker.getLatLng(), Math.max(map.getZoom(), 8), { animate: true });
                if (openPopup) marker.openPopup();
            }
        }
 
        function displayLocationsOnMap(locations) {
            markersGroup.clearLayers();
            markerIndex = {};
 
            locations.forEach(location => {
                const normalizedActivity = normalizeActivityLevel(location.activityLevel);

                const hauntedIcon = L.divIcon({
                    className: `ed-marker activity-${normalizedActivity}`,
                    html: '📍',
                    iconSize: [24, 24],
                    iconAnchor: [12, 12]
                });
 
                const marker = L.marker(location.coordinates, { icon: hauntedIcon }).addTo(markersGroup);

                marker.locationId = location.id;
                markerIndex[location.id] = marker;
 
                const popupContent = `
                    <div style="max-width: 300px;">
                        <h3 style="margin-bottom: 10px;">${escapeHtml(location.name)}</h3>
                        ${location.imageUrl ? `
                            <img src="${escapeAttribute(location.imageUrl)}" 
                                 alt="${escapeAttribute(location.name)}" 
                                 style="width: 100%; max-width: 280px; height: 180px; object-fit: cover; border-radius: 5px; margin-bottom: 10px;"
                                 onerror="this.style.display='none'">
                        ` : ''}
                        <p style="margin-bottom: 5px;"><strong>Location:</strong> ${escapeHtml(location.city)}, ${escapeHtml(location.state)}</p>
                        <p style="margin-bottom: 5px;"><strong>Type:</strong> ${escapeHtml(location.type)}</p>
                        <p style="margin-bottom: 5px;"><strong>Established:</strong> ${escapeHtml(String(location.yearEstablished || 'Unknown'))}</p>
                        <p style="margin-bottom: 10px;"><strong>Activity Level:</strong> <span style="color: ${normalizedActivity === 'high' ? '#ff4444' : normalizedActivity === 'moderate' ? '#ffaa44' : '#44ff44'};">${escapeHtml(getActivityLabel(normalizedActivity))}</span></p>
                        <div style="margin-bottom: 10px;">
                            <strong>Story:</strong>
                            <p style="margin-top: 5px; line-height: 1.4; font-size: 0.9em;">${escapeHtml(location.story)}</p>
                        </div>
                        <div style="margin-bottom: 10px;">
                            <strong>Reported Phenomena:</strong>
                            <div style="margin-top: 5px; display: flex; flex-wrap: wrap; gap: 4px;">
                                ${(location.features || []).map(feature => `<span style="background: rgba(255, 107, 53, 0.2); color: #ff6b35; padding: 2px 6px; border-radius: 8px; font-size: 0.8em; border: 1px solid rgba(255, 107, 53, 0.3);">${escapeHtml(feature)}</span>`).join('')}
                            </div>
                        </div>
                        <div style="text-align: center; margin-top: 15px; display: flex; justify-content: center; gap: 8px; flex-wrap: wrap;">
                            <a href="${getDirectionsUrl(location.coordinates)}" 
                               target="_blank" 
                               rel="noopener noreferrer" 
                               style="display: inline-flex; align-items: center; gap: 4px; background: rgba(255, 107, 53, 0.2); color: #ff8c42; padding: 4px 10px; border-radius: 12px; text-decoration: none; font-weight: bold; font-size: 0.75em; border: 1px solid #ff6b35;">
                                <svg viewBox="0 0 24 24" width="12" height="12" style="width: 12px !important; height: 12px !important; min-width: 12px; max-width: 12px; fill: currentColor;"><path d="M21.71 11.29l-9-9a1 1 0 0 0-1.42 0l-9 9a1 1 0 0 0 0 1.42l9 9a1 1 0 0 0 1.42 0l9-9a1 1 0 0 0 0-1.42zM14 14.5V12h-4v3H8v-4a1 1 0 0 1 1-1h5V7.5l3.5 3.5-3.5 3.5z"/></svg>
                                Directions
                            </a>
                            ${getPopupBookmarkButton(location.id)}
                        </div>
                    </div>
                `;
 
                marker.bindPopup(popupContent, {
                    maxWidth: 320,
                    maxHeight: 600,
                    className: 'haunted-popup'
                });

                marker.on('click', () => {
                    setSelectedLocation(location.id, false, true);
                    marker.openPopup();
                });

                marker.on('popupopen', () => {
                    setSelectedLocation(location.id, false, true);
                });
            });

            if (selectedLocationId && markerIndex[selectedLocationId]) {
                setSelectedLocation(selectedLocationId, false, false);
            }
        }
 
        function displayLocationsList(locations) {
            const listContainer = document.getElementById('locationsList');

            if (!locations.length) {
                listContainer.innerHTML = `<div class="no-results">No locations matched your search or filters.</div>`;
                updateResultsSummary(0);
                return;
            }
            
            listContainer.innerHTML = locations.map(location => {
                const normalizedActivity = normalizeActivityLevel(location.activityLevel);

                return `
                    <div class="location-card activity-${escapeAttribute(normalizedActivity)} ${selectedLocationId === location.id ? 'selected' : ''}" data-id="${escapeAttribute(location.id)}" style="display: flex; flex-direction: column; height: 100%;">
                        ${location.imageUrl ? `
                            <div class="location-image">
                                <img src="${escapeAttribute(location.imageUrl)}" 
                                     alt="${escapeAttribute(location.name)}" 
                                     onerror="this.style.display='none'"
                                     loading="lazy">
                            </div>
                        ` : ''}
                        <div class="activity-badge ${escapeAttribute(normalizedActivity)}">
                            <span class="activity-dot"></span>
                            ${escapeHtml(getActivityLabel(normalizedActivity))}
                        </div>
                        <div class="location-title">${escapeHtml(location.name)}</div>
                        <div class="coordinates">${escapeHtml(location.city)}, ${escapeHtml(location.state)}</div>
                        <div class="location-type">${escapeHtml(location.type)}</div>
                        <div class="location-story">${escapeHtml(location.story)}</div>
                        <div class="location-features">
                            <h4>Reported Phenomena:</h4>
                            <div class="features-list">
                                ${(location.features || []).map(feature => `<span class="feature-tag">${escapeHtml(feature)}</span>`).join('')}
                            </div>
                        </div>
                        ${location.imageSource ? `<div class="image-source-badge">Source: ${escapeHtml(location.imageSource)}</div>` : ''}
                        <span class="expand-hint">Click to expand / collapse</span>
                        <div style="flex: 1;"></div>
                        <div style="text-align: center; padding-top: 15px; margin-top: auto; display: flex; justify-content: center; gap: 8px; flex-wrap: wrap;">
                            <a href="${getDirectionsUrl(location.coordinates)}" 
                               target="_blank" 
                               rel="noopener noreferrer" 
                               onclick="event.stopPropagation()"
                               style="display: inline-flex; align-items: center; gap: 4px; background: rgba(255, 107, 53, 0.2); color: #ff8c42; padding: 4px 10px; border-radius: 12px; text-decoration: none; font-weight: bold; font-size: 0.75em; border: 1px solid #ff6b35;">
                                <svg viewBox="0 0 24 24" width="12" height="12" style="width: 12px !important; height: 12px !important; min-width: 12px; max-width: 12px; fill: currentColor;"><path d="M21.71 11.29l-9-9a1 1 0 0 0-1.42 0l-9 9a1 1 0 0 0 0 1.42l9 9a1 1 0 0 0 1.42 0l9-9a1 1 0 0 0 0-1.42zM14 14.5V12h-4v3H8v-4a1 1 0 0 1 1-1h5V7.5l3.5 3.5-3.5 3.5z"/></svg>
                                Directions
                            </a>
                            ${getCardBookmarkButton(location.id)}
                        </div>
                    </div>
                `;
            }).join('');

            document.querySelectorAll('.location-card').forEach(card => {
                card.addEventListener('click', () => {
                    card.classList.toggle('expanded');
                    setSelectedLocation(card.dataset.id, true, false);
                });
            });

            updateResultsSummary(locations.length);
        }
 
        function updateStatistics() {
            const totalCount = hauntedLocations.length;
            const highActivityCount = hauntedLocations.filter(loc => normalizeActivityLevel(loc.activityLevel) === 'high').length;
            document.getElementById('totalLocations').textContent = totalCount;
            document.getElementById('highActivity').textContent = highActivityCount;
        }
 
        function updateDisplayedCount(count) {
            document.getElementById('displayedCount').textContent = count;
        }

        function updateResultsSummary(count) {
            const summary = document.getElementById('resultsSummary');
            if (summary) summary.textContent = `Showing ${count} location${count === 1 ? '' : 's'}`;
        }

        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function escapeAttribute(value) {
            return escapeHtml(value);
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadLocations();
        });
 
        document.getElementById('stateFilter').addEventListener('change', filterAndDisplayLocations);
        document.getElementById('cityFilter').addEventListener('change', filterAndDisplayLocations);
        document.getElementById('locationType').addEventListener('change', filterAndDisplayLocations);
        document.getElementById('activityLevel').addEventListener('change', filterAndDisplayLocations);
        document.getElementById('sortOrder').addEventListener('change', filterAndDisplayLocations);
        document.getElementById('searchInput').addEventListener('input', filterAndDisplayLocations);
    </script>
</body>
</html>
